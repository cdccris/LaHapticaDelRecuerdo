  <!-- Redirige al reproductor genérico conservando la URL bonita -->
  <script>
    // El reproductor genérico está en el padre (/play/index.html)
    // y lee el poema desde la URL, así que simplemente lo cargamos.
    // Si ya estamos aquí, el service worker / GitHub Pages ya habrá
    // servido este archivo; el JS del padre hará el resto.
  </script>
  <style>
    html,body{margin:0;height:100%;background:#100c18;}
    body{display:flex;align-items:center;justify-content:center;
          font-family:system-ui,sans-serif;color:#888;font-size:14px;}
  </style>
</head>
<body>
  <p>Cargando…</p>
  <!-- El index.html del padre (/play/index.html) no se carga aquí
       porque GitHub Pages sirve este archivo para esta ruta.
       Necesitamos incluir el reproductor completo o redirigir. -->
  <script>
    // Cargar el reproductor genérico inline
    fetch('https://cdccris.github.io/LaHapticaDelRecuerdo/play/index.html')
      .then(r => r.text())
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        location.replace('https://cdccris.github.io/LaHapticaDelRecuerdo/play/index.html');
      });
  </script>
</body>
